events {
    worker_connections 1024;
}

http {
    # active_upstream.conf defines which app slot (blue/green) receives traffic.
    # The deploy script rewrites this file and sends `nginx -s reload` to swap
    # traffic with zero downtime.
    include /etc/nginx/conf.d/active_upstream.conf;

    server {
        listen 80;

        location / {
            proxy_pass         http://active_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
