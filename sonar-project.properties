# SonarQube project configuration.
# Documentation: https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/analysis-parameters/

# Unique project key — must match what you create in the SonarQube UI.
sonar.projectKey=devops-sonarqube
sonar.projectName=DevOps SonarQube FastAPI

# Source root. A single dot means the repository root.
sonar.sources=.

# Paths to exclude from analysis: virtual env, caches, generated files, docs.
sonar.exclusions=**/.venv/**,**/__pycache__/**,**/tmp/**,**/*.md,**/*.txt,**/*.yml,**/*.yaml,**/*.conf

# Test directory and its exclusion from source coverage scoring.
sonar.tests=tests
sonar.test.exclusions=tests/**

# Coverage report generated by: uv run pytest --cov --cov-report=xml
# The CI workflow uploads this as an artifact and the scan job downloads it.
sonar.python.coverage.reportPaths=coverage.xml

# Target Python version for rule applicability.
sonar.python.version=3.13
